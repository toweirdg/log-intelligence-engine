version: "3.8"

services:
  db:
    image: postgres:15
    container_name: log_db
    restart: always
    environment:
      POSTGRES_USER: log_user
      POSTGRES_PASSWORD: simple123
      POSTGRES_DB: log_engine
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    container_name: log_redis
    ports:
      - "6379:6379"
